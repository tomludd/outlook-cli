name: Publish to NuGet and GitHub Releases

on:
  push:
    tags:
      - 'release/*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract version from tag
      id: get_version
      shell: bash
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/release/}
        echo "VERSION=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "Extracted version: $TAG_NAME"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Pack
      run: dotnet pack Outlook.Cli/Outlook.Cli.csproj -c Release -o ./nupkg /p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./nupkg/*.nupkg
        generate_release_notes: true
        tag_name: release/${{ steps.get_version.outputs.VERSION }}
        name: Release ${{ steps.get_version.outputs.VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push to NuGet
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_PUSH_APIKEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
